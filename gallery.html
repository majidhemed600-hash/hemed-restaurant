<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Majeed Restaurant | Gallery</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============ HEADER & NAVIGATION BAR ============ -->
  <header>
    <div class="navbar">
      <div class="logo-area">
        <img src="images/logo.png" alt="Majeed Restaurant Logo">
        <h1>MAJEED<span>Modern Tanzania Restaurant</span></h1>
      </div>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="menu.html">Menu</a></li>
          <li><a href="gallery.html" class="active">Gallery</a></li>
          <li><a href="contact.html">Contact Us</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ============ PAGE BANNER ============ -->
  <section class="page-banner">
    <h2>Gallery</h2>
    <p>A glimpse into our restaurant, food, and atmosphere</p>
  </section>

  <!-- ============ GALLERY SECTION (CSS Grid) ============ -->
  <section class="gallery-section">
    <div class="container">
      <div class="gallery-grid">
        <div class="gallery-item">
          <img src="images/dining.jpg" alt="Dining Hall">
        </div>
        <div class="gallery-item">
          <img src="images/grill station.jpg" alt="Grill Station">
        </div>
        <div class="gallery-item">
          <img src="images/Fresh Garden Salad.jpg" alt="Fresh Salads">
        </div>
        <div class="gallery-item">
          <img src="images/chief special.jpg" alt="Chef Special Dish">
        </div>
        <div class="gallery-item">
          <img src="images/outdoor seating.jpg" alt="Outdoor Seating Area">
        </div>
        <div class="gallery-item">
          <img src="images/coffee.jpg" alt="Coffee Corner">
        </div>
        <div class="gallery-item">
          <img src="images/nyama choma.jpg" alt="Nyama Choma">
        </div>
        <div class="gallery-item">
          <img src="images/restaurant.jpg" alt="Restaurant Interior">
        </div>
        <div class="gallery-item">
          <img src="images/Biriyani.jpg" alt="biriani kuku">
      </div>
    </div>
  </section>

  <!-- ============ FOOTER ============ -->
  <footer>
    <p>&copy; 2026 Majeed Restaurant, Arusha - Tanzania. All Rights Reserved.</p>
  </footer>

</body>
</html>
